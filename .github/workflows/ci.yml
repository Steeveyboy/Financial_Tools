name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r news_articles/requirements.txt

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 news_articles/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings as non-blocking
          flake8 news_articles/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        env:
          DB_URL: "sqlite://"
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests found yet"
