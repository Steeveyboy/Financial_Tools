# Alembic configuration for findata
# =========================================
# This file is used by the `alembic` command-line tool.  Run from the repo root:
#
#   alembic upgrade head            # apply all pending migrations
#   alembic downgrade -1            # roll back the last migration
#   alembic revision --autogenerate -m "message"
#
# The database URL is normally set via the DATABASE_URL environment variable;
# the value below is only a fallback and is overridden by env.py at runtime.

[alembic]
# Path to the migration scripts, relative to this file's location
script_location = findata/db/migrations
prepend_sys_path = .

# SQLAlchemy URL — overridden at runtime by env.py reading DATABASE_URL env var
sqlalchemy.url = sqlite:///resonance.db

# Template for new migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone for "Create Date" in migration headers
# timezone = UTC

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
