# pm_agent configuration
#
# Controls which directories to scan, priority overrides, and label taxonomy.

repo:
  owner: "Steeveyboy"
  name: "Financial_Tools"

# GitHub Project board name
project_name: "Resonance Desk Roadmap"

# Directories to scan for TODOs and stubs
scan_directories:
  - "news_articles"
  - "market_data"
  - "SentimentAnalysis"
  - "FinancialWebScrapers"
  - "pm_agent"

# File extensions to scan
scan_extensions:
  - ".py"

# Patterns that indicate a stub / unfinished work
stub_patterns:
  - "# TODO"
  - "TODO:"
  - "is not yet implemented"
  - "not yet implemented"

# Label taxonomy — created in the repo if they don't exist
labels:
  wbs:
    - name: "wbs:extraction"
      color: "1d76db"
      description: "Work breakdown: data extraction"
    - name: "wbs:transformation"
      color: "5319e7"
      description: "Work breakdown: data transformation"
    - name: "wbs:schema"
      color: "e99695"
      description: "Work breakdown: database schema"
    - name: "wbs:infrastructure"
      color: "f9d0c4"
      description: "Work breakdown: CI/CD, testing, tooling"
    - name: "wbs:analysis"
      color: "c5def5"
      description: "Work breakdown: data analysis"
  agent:
    - name: "agent:coding"
      color: "0e8a16"
      description: "Task for coding agent"
    - name: "agent:testing"
      color: "fbca04"
      description: "Task for testing agent"
    - name: "agent:docs"
      color: "d4c5f9"
      description: "Task for documentation agent"
  priority:
    - name: "priority:high"
      color: "b60205"
      description: "High priority"
    - name: "priority:medium"
      color: "ff9f1c"
      description: "Medium priority"
    - name: "priority:low"
      color: "0e8a16"
      description: "Low priority"
  status:
    - name: "status:ready"
      color: "0e8a16"
      description: "Ready for an agent to pick up"
    - name: "status:blocked"
      color: "b60205"
      description: "Blocked by a dependency"
    - name: "status:in-progress"
      color: "fbca04"
      description: "Currently being worked on"

# Predefined WBS tasks — these are always generated regardless of scan results.
# They represent known architectural work that may not be discoverable from TODOs alone.
predefined_tasks:
  - title: "Implement SentimentTransformer.transform() using FinBERT"
    summary: |
      Fill in the stub at news_articles/transformers/sentiment.py to score
      articles using the ProsusAI/finbert model from HuggingFace.
    files:
      - "news_articles/transformers/sentiment.py"
      - "news_articles/requirements.txt"
    approach: |
      Option A — Reuse existing scikit-learn model from SentimentAnalysis/ (fast, lower quality)
      Option B (recommended) — Use ProsusAI/finbert via HuggingFace transformers
      Option C — Zero-shot with Claude API (highest quality, higher cost)
    acceptance_criteria:
      - "SentimentTransformer.transform() returns articles with a float sentiment_score (0.0–1.0)"
      - "Articles with None/empty content get sentiment_score = None"
      - "Batch processing logs min/max/mean scores"
      - "Unit tests cover happy path and None-content edge case"
    interface: |
      Input:  list[dict] — article dicts with 'content' key (str | None)
      Output: list[dict] — same dicts with added 'sentiment_score' key (float | None)
    test_file: "tests/news_articles/transformers/test_sentiment.py"
    dependencies_text: "torch~=2.0, transformers~=4.40"
    labels: ["wbs:transformation", "agent:coding", "priority:high"]
    dependencies: []

  - title: "Implement EntityTransformer.transform() using spaCy NER"
    summary: |
      Fill in the stub at news_articles/transformers/entity.py to extract
      company/ticker mentions from article content using spaCy NER.
    files:
      - "news_articles/transformers/entity.py"
      - "news_articles/requirements.txt"
      - "market_data/tickers.json"
    approach: |
      Option A — Dictionary lookup against tickers.json (fast, lower recall)
      Option B (recommended) — spaCy NER for ORG entities + fuzzy match to tickers
      Option C — LLM extraction via Claude API (most accurate, higher cost)
    acceptance_criteria:
      - "EntityTransformer.transform() returns articles with mentioned_tickers list[str]"
      - "Articles with None content get mentioned_tickers = []"
      - "Pipeline calls repo.link_tickers() with extracted tickers"
      - "Unit tests cover happy path and None-content edge case"
    interface: |
      Input:  list[dict] — article dicts with 'content' and 'title' keys
      Output: list[dict] — same dicts with added 'mentioned_tickers' key (list[str])
    test_file: "tests/news_articles/transformers/test_entity.py"
    dependencies_text: "spacy~=3.7 (+ en_core_web_sm model)"
    labels: ["wbs:transformation", "agent:coding", "priority:high"]
    dependencies: []

  - title: "Add transform_log table and implement get_untransformed()"
    summary: |
      Create a transform_log table to track which transforms have been applied
      to which articles, then implement ArticleRepository.get_untransformed()
      to query it properly instead of returning all articles.
    files:
      - "news_articles/db/schema.py"
      - "news_articles/db/repository.py"
    approach: |
      Add a transform_log table with columns: article_id (FK), transform_id (str),
      applied_at (datetime). get_untransformed() should LEFT JOIN articles against
      transform_log WHERE transform_log.article_id IS NULL for the given transform_id.
    acceptance_criteria:
      - "transform_log table is defined in schema.py"
      - "get_untransformed(transform_name) returns only articles not yet processed"
      - "Repository has a log_transform(article_id, transform_id) method"
      - "TransformationPipeline calls log_transform() after successful persist"
      - "Unit tests verify filtering behavior"
    interface: |
      get_untransformed(transform_name: str) -> list[dict]
      log_transform(article_id: int, transform_id: str) -> None
    test_file: "tests/news_articles/test_repository.py"
    dependencies_text: "None"
    labels: ["wbs:schema", "agent:coding", "priority:high"]
    dependencies: []

  - title: "Add sentiment_score FLOAT column to articles schema"
    summary: |
      Add a nullable sentiment_score FLOAT column to the articles table
      so that SentimentTransformer results can be persisted.
    files:
      - "news_articles/db/schema.py"
    approach: |
      Add Column("sentiment_score", Float, nullable=True) to the articles table
      definition. For existing databases, either recreate the DB (dev) or add
      an Alembic migration (prod).
    acceptance_criteria:
      - "articles table has a sentiment_score FLOAT column"
      - "Column is nullable (existing articles get NULL)"
      - "create_tables() still works on a fresh database"
    interface: "N/A — schema change only"
    test_file: "tests/news_articles/test_repository.py"
    dependencies_text: "None"
    labels: ["wbs:schema", "agent:coding", "priority:medium"]
    dependencies:
      - "Implement SentimentTransformer.transform() using FinBERT"

  - title: "Persist sentiment_score in TransformationPipeline._persist()"
    summary: |
      Add a branch in TransformationPipeline._persist() for the 'sentiment'
      transform_id that writes sentiment_score back to the articles table.
    files:
      - "news_articles/pipeline.py"
      - "news_articles/db/repository.py"
    approach: |
      Add a repository method update_sentiment_scores(updates: list[dict]) that
      batch-updates articles by ID. Add a branch in _persist() for transform_id
      == "sentiment" that calls it.
    acceptance_criteria:
      - "_persist() handles transform_id 'sentiment'"
      - "sentiment_score is written to the articles table"
      - "Articles with sentiment_score = None are skipped"
      - "Unit tests verify persistence"
    interface: |
      update_sentiment_scores(updates: list[dict]) -> None
      Each dict: {"id": int, "sentiment_score": float | None}
    test_file: "tests/news_articles/test_pipeline.py"
    dependencies_text: "None"
    labels: ["wbs:transformation", "agent:coding", "priority:medium"]
    dependencies:
      - "Add sentiment_score FLOAT column to articles schema"
      - "Implement SentimentTransformer.transform() using FinBERT"

  - title: "Write unit tests for ArticleRepository (SQLite in-memory)"
    summary: |
      Create comprehensive unit tests for ArticleRepository covering insert,
      deduplication, link_tickers, bulk_link_tickers, get_all, get_by_ticker,
      and get_ids_by_urls.
    files:
      - "tests/news_articles/test_repository.py"
    approach: |
      Use pytest with a sqlite:// in-memory engine fixture. Test each public
      method with happy path, edge cases (empty input, duplicates), and verify
      data integrity.
    acceptance_criteria:
      - "Tests cover all public ArticleRepository methods"
      - "Tests use SQLite in-memory (no external DB required)"
      - "Edge cases: empty list, duplicate URLs, missing tickers"
      - "All tests pass with python -m pytest tests/ -v"
    interface: "N/A — tests only"
    test_file: "tests/news_articles/test_repository.py"
    dependencies_text: "pytest"
    labels: ["wbs:infrastructure", "agent:testing", "priority:medium"]
    dependencies: []

  - title: "Write unit tests for RSSExtractor and FNSPIDExtractor"
    summary: |
      Create unit tests for both extractors. Mock feedparser.parse() for RSS
      and datasets.load_dataset() for FNSPID. Test date parsing, HTML stripping,
      deduplication, and filter logic.
    files:
      - "tests/news_articles/extractors/test_rss.py"
      - "tests/news_articles/extractors/test_huggingface.py"
    approach: |
      Mock external dependencies. For RSS, provide canned feedparser output.
      For FNSPID, provide an iterable of dicts simulating the HuggingFace stream.
    acceptance_criteria:
      - "Tests cover extract() for both extractors"
      - "RSS tests verify HTML stripping and date parsing"
      - "FNSPID tests verify ticker filtering and date range filtering"
      - "No real HTTP requests or HuggingFace downloads in tests"
    interface: "N/A — tests only"
    test_file: "tests/news_articles/extractors/"
    dependencies_text: "pytest"
    labels: ["wbs:infrastructure", "agent:testing", "priority:medium"]
    dependencies: []

  - title: "Add GitHub Actions CI workflow (pytest + flake8)"
    summary: |
      Add a CI workflow that runs on push and PR to main. Should install
      dependencies, run pytest, and run flake8 linting.
    files:
      - ".github/workflows/ci.yml"
    approach: |
      Use GitHub Actions with a Python matrix (3.10, 3.11, 3.12). Install
      news_articles/requirements.txt + pytest + flake8. Run pytest and flake8
      as separate steps.
    acceptance_criteria:
      - "CI runs on push to main and on pull requests"
      - "pytest and flake8 both run and report status"
      - "Python version matrix covers 3.10+"
    interface: "N/A — CI workflow"
    test_file: "N/A"
    dependencies_text: "N/A"
    labels: ["wbs:infrastructure", "agent:coding", "priority:medium"]
    dependencies: []

  - title: "Integrate sentiment scores with market_data OHLCV for correlation"
    summary: |
      Build a module or notebook that joins article sentiment scores with
      daily OHLCV price data to analyze whether sentiment predicts price movement.
    files:
      - "market_data/"
    approach: |
      Join articles (with sentiment_score) to daily_ohlcv on (ticker, date).
      Compute correlation between average daily sentiment and next-day returns.
      Can be a Jupyter notebook or a Python script.
    acceptance_criteria:
      - "Joins sentiment scores with OHLCV data by ticker and date"
      - "Computes and visualizes correlation"
      - "Documents methodology and findings"
    interface: "N/A — analysis module"
    test_file: "N/A"
    dependencies_text: "pandas, matplotlib"
    labels: ["wbs:analysis", "agent:coding", "priority:low"]
    dependencies:
      - "Implement SentimentTransformer.transform() using FinBERT"
      - "Persist sentiment_score in TransformationPipeline._persist()"
